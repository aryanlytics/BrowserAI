_format_version: "3.0"

services:

  # Auth Service
  - name: auth-service
    url: http://host.docker.internal:4001

    routes:
      - name: auth-routes
        paths:
          - /api/auth
        strip_path: false

  # Voice Service
  - name: voice-service
    url: http://host.docker.internal:4002

    routes:
      - name: voice-routes
        paths:
          - /api/voice
        strip_path: false

plugins:

  # CORS
  - name: cors
    config:
      origins:
        - http://localhost:3000

      methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS

      headers:
        - Accept
        - Accept-Version
        - Content-Length
        - Content-Type
        - Authorization
        - Cookie

      credentials: true
      max_age: 3600